# ============================================================
# Nginx 反向代理配置 — box.fang-hui.top
# SSL 证书由 certbot (Let's Encrypt) 管理
# ============================================================

# -------------------- HTTP → HTTPS 重定向 --------------------
server {
    listen 80;
    server_name box.fang-hui.top;

    # certbot 自动续期需要的 ACME 验证目录
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其他请求一律 301 跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# -------------------- HTTPS 反向代理 → Streamlit --------------------
server {
    listen 443 ssl http2;
    server_name box.fang-hui.top;

    # ---- SSL 证书（由 certbot 生成，宿主机 /etc/letsencrypt 挂载）----
    ssl_certificate     /etc/letsencrypt/live/box.fang-hui.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/box.fang-hui.top/privkey.pem;

    # ---- 现代 TLS 配置 ----
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    # ---- 上传大小限制 ----
    client_max_body_size 50M;

    # ---- 反向代理到 Streamlit ----
    location / {
        proxy_pass http://app:8501;

        # WebSocket 支持（Streamlit 核心依赖）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 标准代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamlit 长连接超时
        proxy_read_timeout 86400;
    }
}
